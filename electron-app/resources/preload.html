    <script>
        (function() {
            var bg = '#ffffff';
            try {
                var storedBg = localStorage.getItem('theme.background');
                var storedTheme = localStorage.getItem('theme');
                if (storedBg) {
                    bg = storedBg;
                } else if (storedTheme) {
                    if (storedTheme.indexOf('dark') !== -1) {
                        bg = '#1f272a';
                    }
                } else {
                    var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                    bg = dark ? '#1f272a' : '#ffffff';
                }
            } catch (e) {}
            document.documentElement.style.setProperty('background-color', bg, 'important');
        })();
    </script>
    <style>

        .theia-preload {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            /* Above styles copied from https://github.com/eclipse-theia/theia/blob/5aeef6c0c683b4e91713ab736957e6655b486adc/packages/core/src/browser/style/index.css#L147-L161 */
            /* Otherwise, there is a flickering when Theia's CSS loads. */

            background-image: none;
        }

        .theia-preload::after {
            /* remove default loading animation */
            content: none;
        }

        .spinner-container {
            display: flex;
            flex-direction: center;
            align-self: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .custom-spinner {
            align-self: center;
        }

        .custom-spinner img {
            width: 16vh;
            height: 16vh;
            animation-delay: 0;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-name: preload-spinner;
            animation-timing-function: ease;
        }

        @keyframes preload-spinner {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(0.8);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
